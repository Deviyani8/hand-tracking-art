<!DOCTYPE html>
<html>
<head>
  <title>Neon Digital Threads - Final</title>
  <style>
    body { margin: 0; overflow: hidden; background: black; }
    video {
      position: absolute;
      width: 100vw; height: 100vh;
      object-fit: cover;
      transform: scaleX(-1);
    }
    canvas { position: absolute; top: 0; left: 0; }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let digits = [];
let shapes = [];
let prevPoints = {};

const neonColors = [
  "rgba(255,0,150,1)",
  "rgba(180,0,255,1)",
  "rgba(0,200,255,1)",
  "rgba(0,255,180,1)"
];

// smooth helper
function lerp(a, b, t) {
  return a + (b - a) * t;
}

// smooth point
function getPoint(hand, i, key) {
  const raw = {
    x: (1 - hand[i].x) * canvas.width,
    y: hand[i].y * canvas.height
  };

  let prev = prevPoints[key] || raw;

  const smooth = {
    x: lerp(prev.x, raw.x, 0.4),
    y: lerp(prev.y, raw.y, 0.4)
  };

  prevPoints[key] = smooth;
  return smooth;
}

// DIGITS
function createDigit(x, y) {
  digits.push({
    x, y,
    vx: (Math.random()-0.5)*0.5,
    vy: (Math.random()-0.5)*0.5,
    life: 1,
    size: 4,
    value: Math.floor(Math.random()*10)
  });
}

function drawDigits() {
  digits.forEach(d => {
    d.x += d.vx;
    d.y += d.vy;
    d.life -= 0.02;

    ctx.fillStyle = `rgba(255,255,255,${d.life})`;
    ctx.font = `${d.size}px monospace`;
    ctx.fillText(d.value, d.x, d.y);
  });

  digits = digits.filter(d => d.life > 0);
}

// SHAPES
function drawPolygon(x, y, sides, size, opacity) {
  ctx.beginPath();
  for (let i = 0; i < sides; i++) {
    const a = (i/sides)*Math.PI*2;
    const px = x + Math.cos(a)*size;
    const py = y + Math.sin(a)*size;
    if (i===0) ctx.moveTo(px,py);
    else ctx.lineTo(px,py);
  }
  ctx.closePath();
  ctx.strokeStyle = `rgba(255,255,255,${opacity})`;
  ctx.stroke();
}

function createShape(x, y) {
  shapes.push({
    x, y,
    size: 15 + Math.random()*20,
    life: 1,
    type: Math.floor(Math.random()*7)
  });
}

function drawShapes() {
  shapes.forEach(s => {
    s.life -= 0.01;
    const o = s.life * 0.3;

    if (s.type < 6) drawPolygon(s.x, s.y, s.type+3, s.size, o);
    else {
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(255,255,255,${o})`;
      ctx.stroke();
    }
  });

  shapes = shapes.filter(s => s.life > 0);
}

// LINE (final finesse)
function drawLine(p1, p2, i) {
  const dx = p2.x - p1.x;
  const dy = p2.y - p1.y;
  const dist = Math.sqrt(dx*dx + dy*dy);

  // depth
  const alpha = Math.max(0.2, 1 - dist / 600);
  const width = 0.8 + (1 - dist/600) * 2;

  // tension curve
  const cx = (p1.x + p2.x)/2 + Math.sin(Date.now()*0.002 + i) * (dist * 0.1);
  const cy = (p1.y + p2.y)/2 + Math.cos(Date.now()*0.002 + i) * (dist * 0.1);

  ctx.beginPath();
  ctx.moveTo(p1.x, p1.y);
  ctx.quadraticCurveTo(cx, cy, p2.x, p2.y);

  const color = neonColors[i % neonColors.length].replace("1)", `${alpha})`);

  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.shadowBlur = 15 * alpha;
  ctx.shadowColor = color;

  ctx.stroke();
}

const hands = new Hands({
  locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

hands.onResults(results => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawDigits();
  drawShapes();

  if (!results.multiHandLandmarks) return;

  const handsData = results.multiHandLandmarks;
  const fingers = [4,8,12,16,20];

  handsData.forEach((hand, hi) => {
    fingers.forEach(f => {
      const p = getPoint(hand, f, hi+"_"+f);

      let prev = prevPoints["raw_"+hi+"_"+f] || p;
      let speed = Math.hypot(p.x-prev.x, p.y-prev.y);

      if (speed > 6) {
        if (Math.random()<0.4) createDigit(p.x,p.y);
        if (Math.random()<0.08) createShape(p.x,p.y);
      }

      prevPoints["raw_"+hi+"_"+f] = p;
    });
  });

  if (handsData.length >= 2) {
    const h1 = handsData[0];
    const h2 = handsData[1];

    fingers.forEach((f1,i)=>{
      fingers.forEach((f2,j)=>{
        if(i!==j){
          const p1 = getPoint(h1,f1,"a"+i);
          const p2 = getPoint(h2,f2,"b"+j);
          drawLine(p1,p2,i+j);
        }
      });
    });
  }
});

const camera = new Camera(video,{
  onFrame: async ()=>{ await hands.send({image: video}); },
  width:1280,
  height:720
});

camera.start();
</script>

</body>
</html>
