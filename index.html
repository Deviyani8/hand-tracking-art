<!DOCTYPE html>
<html>
<head>
  <title>Digital Silk - Crisscross</title>
  <style>
    body { margin: 0; overflow: hidden; background: black; }
    video {
      position: absolute;
      width: 100vw; height: 100vh;
      object-fit: cover;
      transform: scaleX(-1);
    }
    canvas { position: absolute; top: 0; left: 0; }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let digits = [];
let prevPoints = {};

// Helper
function getPoint(hand, i) {
  return {
    x: (1 - hand[i].x) * canvas.width,
    y: hand[i].y * canvas.height
  };
}

// Digit particles
function createDigit(x, y, intensity) {
  digits.push({
    x, y,
    vx: (Math.random()-0.5) * 0.8,
    vy: (Math.random()-0.5) * 0.8,
    life: 1,
    size: 6 + intensity * 4,
    value: Math.floor(Math.random()*10)
  });
}

function drawDigits() {
  digits.forEach(d => {
    d.x += d.vx;
    d.y += d.vy;
    d.life -= 0.015;

    ctx.fillStyle = `rgba(255,255,255,${d.life})`;
    ctx.font = `${d.size}px monospace`;
    ctx.fillText(d.value, d.x, d.y);
  });

  digits = digits.filter(d => d.life > 0);
}

// CRISSCROSS strings
function drawCrisscross(p1, p2, index) {
  const strands = 6;

  for (let s = 0; s < strands; s++) {
    ctx.beginPath();

    const offset = (s - strands/2) * 5;

    const steps = 20;

    for (let t = 0; t <= 1; t += 1/steps) {
      let x = p1.x + (p2.x - p1.x) * t;
      let y = p1.y + (p2.y - p1.y) * t;

      // cross wave
      y += Math.sin(t * Math.PI * 6 + Date.now()*0.006 + s) * 10;
      x += Math.cos(t * Math.PI * 4 + s) * offset;

      if (t === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }

    // gradient
    const gradient = ctx.createLinearGradient(p1.x, p1.y, p2.x, p2.y);
    gradient.addColorStop(0, "rgba(255,0,150,0.8)");
    gradient.addColorStop(0.5, "rgba(150,0,255,0.8)");
    gradient.addColorStop(1, "rgba(0,150,255,0.8)");

    ctx.strokeStyle = gradient;
    ctx.lineWidth = 0.8 + s * 0.15;
    ctx.shadowBlur = 6;
    ctx.shadowColor = "purple";

    ctx.stroke();
  }
}

const hands = new Hands({
  locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

hands.onResults(results => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawDigits();

  if (!results.multiHandLandmarks) return;

  const handsData = results.multiHandLandmarks;
  const fingers = [4, 8, 12, 16, 20];

  handsData.forEach((hand, hIndex) => {

    fingers.forEach((f, i) => {
      const p = getPoint(hand, f);

      // velocity detection
      const key = hIndex + "_" + f;
      let prev = prevPoints[key] || p;

      let dx = p.x - prev.x;
      let dy = p.y - prev.y;

      let speed = Math.sqrt(dx*dx + dy*dy);

      // create digits on high motion
      if (speed > 8 && Math.random() < 0.5) {
        createDigit(p.x, p.y, speed * 0.05);
      }

      prevPoints[key] = p;
    });
  });

  // Draw connections if 2 hands
  if (handsData.length >= 2) {
    const hand1 = handsData[0];
    const hand2 = handsData[1];

    fingers.forEach((f, i) => {
      drawCrisscross(getPoint(hand1, f), getPoint(hand2, f), i);
    });
  }
});

const camera = new Camera(video, {
  onFrame: async () => {
    await hands.send({image: video});
  },
  width: 1280,
  height: 720
});

camera.start();
</script>

</body>
</html>
