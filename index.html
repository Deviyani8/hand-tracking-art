<!DOCTYPE html>
<html>
<head>
  <title>Digital Silk Interaction</title>
  <style>
    body { margin: 0; overflow: hidden; background: black; }
    video {
      position: absolute;
      width: 100vw; height: 100vh;
      object-fit: cover;
      transform: scaleX(-1);
    }
    canvas { position: absolute; top: 0; left: 0; }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let digits = [];

// Helper
function getPoint(hand, i) {
  return {
    x: (1 - hand[i].x) * canvas.width,
    y: hand[i].y * canvas.height
  };
}

// Create digit particles
function createDigit(x, y) {
  digits.push({
    x, y,
    vx: (Math.random() - 0.5) * 1,
    vy: (Math.random() - 0.5) * 1,
    life: 1,
    value: Math.floor(Math.random() * 10)
  });
}

// Draw digits
function drawDigits() {
  digits.forEach(d => {
    d.x += d.vx;
    d.y += d.vy;
    d.life -= 0.01;

    ctx.fillStyle = `rgba(255,255,255,${d.life})`;
    ctx.font = "10px monospace";
    ctx.fillText(d.value, d.x, d.y);
  });

  digits = digits.filter(d => d.life > 0);
}

// Wavy multi-strings
function drawMultiWave(p1, p2, fingerIndex) {
  const strands = 5;

  for (let s = 0; s < strands; s++) {

    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);

    const steps = 25;

    for (let t = 0; t <= 1; t += 1/steps) {
      let x = p1.x + (p2.x - p1.x) * t;
      let y = p1.y + (p2.y - p1.y) * t;

      // layered wave offsets
      y += Math.sin(t * Math.PI * 4 + Date.now()*0.005 + s) * (8 + s*2);

      ctx.lineTo(x, y);
    }

    // gradient colors (pink → purple → blue)
    const gradient = ctx.createLinearGradient(p1.x, p1.y, p2.x, p2.y);
    gradient.addColorStop(0, "rgba(255,0,150,0.8)");
    gradient.addColorStop(0.5, "rgba(150,0,255,0.8)");
    gradient.addColorStop(1, "rgba(0,150,255,0.8)");

    ctx.strokeStyle = gradient;
    ctx.lineWidth = 1 + s * 0.2;
    ctx.shadowBlur = 8;
    ctx.shadowColor = "purple";

    ctx.stroke();

    // create digit particles along strands
    if (Math.random() < 0.3) {
      const mx = (p1.x + p2.x)/2 + (Math.random()-0.5)*30;
      const my = (p1.y + p2.y)/2 + (Math.random()-0.5)*30;
      createDigit(mx, my);
    }
  }
}

const hands = new Hands({
  locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

hands.onResults(results => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawDigits();

  if (!results.multiHandLandmarks || results.multiHandLandmarks.length < 2) return;

  const hand1 = results.multiHandLandmarks[0];
  const hand2 = results.multiHandLandmarks[1];

  const fingers = [4, 8, 12, 16, 20];

  fingers.forEach((f, i) => {
    const p1 = getPoint(hand1, f);
    const p2 = getPoint(hand2, f);

    drawMultiWave(p1, p2, i);
  });
});

const camera = new Camera(video, {
  onFrame: async () => {
    await hands.send({image: video});
  },
  width: 1280,
  height: 720
});

camera.start();
</script>

</body>
</html>
