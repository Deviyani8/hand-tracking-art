<!DOCTYPE html>
<html>
<head>
  <title>Artistic Hand Interaction</title>
  <style>
    body { margin: 0; overflow: hidden; background: black; }
    video {
      position: absolute;
      width: 100vw; height: 100vh;
      object-fit: cover;
      transform: scaleX(-1);
    }
    canvas { position: absolute; top: 0; left: 0; }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let isGlobeMode = false;
let globeX = 0;
let globeY = 0;
let globeSize = 0;
let rotation = 0;
let rotationVelocity = 0;

// Helper
function getPoint(hand, i) {
  return {
    x: (1 - hand[i].x) * canvas.width,
    y: hand[i].y * canvas.height
  };
}

// 🌊 Wavy string
function drawWave(p1, p2, i) {
  ctx.beginPath();
  ctx.moveTo(p1.x, p1.y);

  const steps = 20;

  for (let t = 0; t <= 1; t += 1/steps) {
    let x = p1.x + (p2.x - p1.x) * t;
    let y = p1.y + (p2.y - p1.y) * t;

    // wave offset
    y += Math.sin(t * Math.PI * 4 + Date.now()*0.005) * 10;

    ctx.lineTo(x, y);
  }

  // pink-purple gradient
  const gradient = ctx.createLinearGradient(p1.x, p1.y, p2.x, p2.y);
  gradient.addColorStop(0, "rgba(255,0,150,0.8)");
  gradient.addColorStop(1, "rgba(150,0,255,0.8)");

  ctx.strokeStyle = gradient;
  ctx.lineWidth = 1.5 + i * 0.3;
  ctx.shadowBlur = 10;
  ctx.shadowColor = "magenta";

  ctx.stroke();
}

// 🌍 Globe
function drawGlobe() {
  const r = globeSize;

  ctx.strokeStyle = "rgba(200,100,255,0.8)";
  ctx.lineWidth = 1;
  ctx.shadowBlur = 20;
  ctx.shadowColor = "purple";

  for (let i = 0; i < 12; i++) {
    const angle = i * Math.PI / 12 + rotation;

    ctx.beginPath();
    ctx.ellipse(globeX, globeY, r, r*Math.cos(angle), 0, 0, Math.PI*2);
    ctx.stroke();

    ctx.beginPath();
    ctx.ellipse(globeX, globeY, r*Math.cos(angle), r, 0, 0, Math.PI*2);
    ctx.stroke();
  }
}

const hands = new Hands({
  locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

hands.onResults(results => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!results.multiHandLandmarks || results.multiHandLandmarks.length < 2) {
    // keep globe alive even if tracking drops
    if (isGlobeMode) {
      rotationVelocity *= 0.95;
      rotation += rotationVelocity;
      drawGlobe();
    }
    return;
  }

  const hand1 = results.multiHandLandmarks[0];
  const hand2 = results.multiHandLandmarks[1];

  const p1 = getPoint(hand1, 8);
  const p2 = getPoint(hand2, 8);

  const cx = (p1.x + p2.x)/2;
  const cy = (p1.y + p2.y)/2;

  const dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);

  // smooth switching
  if (dist < 140) isGlobeMode = true;
  if (dist > 200) isGlobeMode = false;

  if (!isGlobeMode) {
    // 🧵 Strings
    const fingers = [4, 8, 12, 16, 20];

    fingers.forEach((f, i) => {
      drawWave(getPoint(hand1, f), getPoint(hand2, f), i);
    });

  } else {
    // 🌍 Globe logic
    globeX = cx;
    globeY = cy;

    // size reacts to distance
    globeSize = dist * 1.2;

    // rotation based on hand movement
    let velocity = (p1.x - p2.x) * 0.002;
    rotationVelocity = rotationVelocity * 0.9 + velocity;
    rotation += rotationVelocity;

    drawGlobe();
  }
});

const camera = new Camera(video, {
  onFrame: async () => {
    await hands.send({image: video});
  },
  width: 1280,
  height: 720
});

camera.start();
</script>

</body>
</html>
