<!DOCTYPE html>
<html>
<head>
  <title>Anti-Gravity Hand Interaction</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }
    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      transform: scaleX(-1);
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let prevPoints = [];
let velocities = [];

function lerp(a, b, t) {
  return a + (b - a) * t;
}

function drawLine(p1, p2, speed) {
  const dx = p2.x - p1.x;
  const dy = p2.y - p1.y;

  ctx.beginPath();
  ctx.moveTo(p1.x, p1.y);

  const cx = (p1.x + p2.x)/2 + dy * 0.1;
  const cy = (p1.y + p2.y)/2 - dx * 0.1;

  ctx.quadraticCurveTo(cx, cy, p2.x, p2.y);

  ctx.strokeStyle = `rgba(0, 200, 255, ${0.3 + speed * 2})`;
  ctx.lineWidth = 2 + speed * 4;
  ctx.shadowBlur = 20;
  ctx.shadowColor = 'cyan';

  ctx.stroke();
}

const hands = new Hands({
  locateFile: (file) => {
    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
  }
});

hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

hands.onResults(results => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!results.multiHandLandmarks) return;

  let currentPoints = [];

  results.multiHandLandmarks.forEach((landmarks, handIndex) => {
    const fingertipIndices = [4, 8, 12, 16, 20];

    fingertipIndices.forEach((i, idx) => {
      const x = (1 - landmarks[i].x) * canvas.width;
      const y = landmarks[i].y * canvas.height;

      const index = handIndex * 5 + idx;

      if (!prevPoints[index]) {
        prevPoints[index] = {x, y};
        velocities[index] = {x:0, y:0};
      }

      let px = lerp(prevPoints[index].x, x, 0.4);
      let py = lerp(prevPoints[index].y, y, 0.4);

      velocities[index].x = (px - prevPoints[index].x) * 0.5;
      velocities[index].y = (py - prevPoints[index].y) * 0.5;

      px += velocities[index].x;
      py += velocities[index].y;

      currentPoints[index] = {x: px, y: py};
      prevPoints[index] = {x: px, y: py};
    });
  });

  for (let i = 0; i < currentPoints.length; i++) {
    for (let j = i + 1; j < currentPoints.length; j++) {
      if (!currentPoints[i] || !currentPoints[j]) continue;

      const dx = currentPoints[i].x - currentPoints[j].x;
      const dy = currentPoints[i].y - currentPoints[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);

      if (dist < 200) {
        const speed = Math.min(dist / 200, 1);
        drawLine(currentPoints[i], currentPoints[j], speed);
      }
    }
  }
});

const camera = new Camera(video, {
  onFrame: async () => {
    await hands.send({image: video});
  },
  width: 1280,
  height: 720
});

camera.start();
</script>

</body>
</html>
