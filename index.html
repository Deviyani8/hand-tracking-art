<!DOCTYPE html>
<html>
<head>
  <title>Neon Digital Threads - Final Polished</title>
  <style>
    body { margin: 0; overflow: hidden; background: black; }
    video {
      position: absolute;
      width: 100vw; height: 100vh;
      object-fit: cover;
      transform: scaleX(-1);
    }
    canvas { position: absolute; top: 0; left: 0; }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let digits = [];
let shapes = [];
let flares = [];
let prevPoints = {};

const neonColors = [
  "rgba(255,0,150,1)",
  "rgba(180,0,255,1)",
  "rgba(0,200,255,1)",
  "rgba(0,255,180,1)"
];

// smooth helper
function lerp(a, b, t) {
  return a + (b - a) * t;
}

// smooth point
function getPoint(hand, i, key) {
  const raw = {
    x: (1 - hand[i].x) * canvas.width,
    y: hand[i].y * canvas.height
  };

  let prev = prevPoints[key] || raw;

  const smooth = {
    x: lerp(prev.x, raw.x, 0.4),
    y: lerp(prev.y, raw.y, 0.4)
  };

  prevPoints[key] = smooth;
  return smooth;
}

// DIGITS
function createDigit(x, y) {
  digits.push({
    x, y,
    vx: (Math.random()-0.5)*0.5,
    vy: (Math.random()-0.5)*0.5,
    life: 1,
    size: 4,
    value: Math.floor(Math.random()*10)
  });
}

function drawDigits() {
  digits.forEach(d => {
    d.x += d.vx;
    d.y += d.vy;
    d.life -= 0.02;

    ctx.fillStyle = `rgba(255,255,255,${d.life})`;
    ctx.font = `${d.size}px monospace`;
    ctx.fillText(d.value, d.x, d.y);
  });

  digits = digits.filter(d => d.life > 0);
}

// SHAPES
function drawPolygon(x, y, sides, size, opacity) {
  ctx.beginPath();
  for (let i = 0; i < sides; i++) {
    const a = (i/sides)*Math.PI*2;
    const px = x + Math.cos(a)*size;
    const py = y + Math.sin(a)*size;
    if (i===0) ctx.moveTo(px,py);
    else ctx.lineTo(px,py);
  }
  ctx.closePath();
  ctx.strokeStyle = `rgba(255,255,255,${opacity})`;
  ctx.stroke();
}

function createShape(x, y) {
  shapes.push({
    x, y,
    size: 15 + Math.random()*20,
    life: 1,
    type: Math.floor(Math.random()*7)
  });
}

function drawShapes() {
  shapes.forEach(s => {
    s.life -= 0.01;
    const o = s.life * 0.3;

    if (s.type < 6) drawPolygon(s.x, s.y, s.type+3, s.size, o);
    else {
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(255,255,255,${o})`;
      ctx.stroke();
    }
  });

  shapes = shapes.filter(s => s.life > 0);
}

// ✨ FLARES
function createFlare(x, y) {
  flares.push({
    x, y,
    size: 10 + Math.random()*20,
    life: 1
  });
}

function drawFlares() {
  flares.forEach(f => {
    f.life -= 0.02;

    const gradient = ctx.createRadialGradient(
      f.x, f.y, 0,
      f.x, f.y, f.size
    );

    gradient.addColorStop(0, `rgba(255,215,0,${f.life * 0.4})`);
    gradient.addColorStop(1, `rgba(255,215,0,0)`);

    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.size, 0, Math.PI*2);
    ctx.fill();
  });

  flares = flares.filter(f => f.life > 0);
}

// LINE (fixed consistency)
function drawLine(p1, p2, i) {
  const cx = (p1.x + p2.x)/2 + Math.sin(Date.now()*0.002 + i) * 15;
  const cy = (p1.y + p2.y)/2 + Math.cos(Date.now()*0.002 + i) * 15;

  ctx.beginPath();
  ctx.moveTo(p1.x, p1.y);
  ctx.quadraticCurveTo(cx, cy, p2.x, p2.y);

  const color = neonColors[i % neonColors.length].replace("1)", "0.7)");

  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.shadowBlur = 12;
  ctx.shadowColor = color;

  ctx.stroke();
}

const hands = new Hands({
  locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

hands.onResults(results => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawDigits();
  drawShapes();
  drawFlares();

  if (!results.multiHandLandmarks) return;

  const handsData = results.multiHandLandmarks;
  const fingers = [4,8,12,16,20];

  handsData.forEach((hand, hi) => {
    fingers.forEach(f => {
      const p = getPoint(hand, f, hi+"_"+f);

      let prev = prevPoints["raw_"+hi+"_"+f] || p;
      let speed = Math.hypot(p.x-prev.x, p.y-prev.y);

      if (speed > 6) {
        if (Math.random()<0.4) createDigit(p.x,p.y);
        if (Math.random()<0.08) createShape(p.x,p.y);
        if (Math.random()<0.05) createFlare(p.x,p.y);
      }

      prevPoints["raw_"+hi+"_"+f] = p;
    });
  });

  if (handsData.length >= 2) {
    const h1 = handsData[0];
    const h2 = handsData[1];

    fingers.forEach((f1,i)=>{
      fingers.forEach((f2,j)=>{
        if(i!==j){
          const p1 = getPoint(h1,f1,"a"+i);
          const p2 = getPoint(h2,f2,"b"+j);
          drawLine(p1,p2,i+j);
        }
      });
    });
  }
});

const camera = new Camera(video,{
  onFrame: async ()=>{ await hands.send({image: video}); },
  width:1280,
  height:720
});

camera.start();
</script>

</body>
</html>
