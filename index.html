<!DOCTYPE html>
<html>
<head>
  <title>Premium Hand Interaction</title>
  <style>
    body { margin: 0; overflow: hidden; background: black; }
    video {
      position: absolute;
      width: 100vw; height: 100vh;
      object-fit: cover;
      transform: scaleX(-1);
    }
    canvas { position: absolute; top: 0; left: 0; }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let prevCenterX = 0;
let rotation = 0;
let particles = [];

// Point helper
function getPoint(hand, i) {
  return {
    x: (1 - hand[i].x) * canvas.width,
    y: hand[i].y * canvas.height
  };
}

// Particles
function createParticle(x, y) {
  particles.push({
    x, y,
    vx: (Math.random()-0.5)*1.5,
    vy: (Math.random()-0.5)*1.5,
    life: 1
  });
}

function drawParticles() {
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.01;

    ctx.beginPath();
    ctx.arc(p.x, p.y, 2, 0, Math.PI*2);
    ctx.fillStyle = `rgba(0,255,200,${p.life})`;
    ctx.fill();
  });

  particles = particles.filter(p => p.life > 0);
}

// Strings
function drawBands(hand1, hand2) {
  const fingers = [4, 8, 12, 16, 20];

  fingers.forEach((f, i) => {
    const p1 = getPoint(hand1, f);
    const p2 = getPoint(hand2, f);

    const cx = (p1.x + p2.x)/2;
    const cy = (p1.y + p2.y)/2;

    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.quadraticCurveTo(cx, cy, p2.x, p2.y);

    ctx.strokeStyle = `hsl(${120 + i*20}, 100%, 60%)`;
    ctx.lineWidth = 2 + i;
    ctx.shadowBlur = 15;
    ctx.shadowColor = "lime";

    ctx.stroke();

    // particles on strings
    createParticle(cx, cy);
  });
}

// Globe
function drawGlobe(cx, cy, r) {
  ctx.strokeStyle = "rgba(0,255,200,0.9)";
  ctx.lineWidth = 1.2;
  ctx.shadowBlur = 20;
  ctx.shadowColor = "cyan";

  for (let i = 0; i < 14; i++) {
    const angle = i * Math.PI / 14 + rotation;

    ctx.beginPath();
    ctx.ellipse(cx, cy, r, r*Math.cos(angle), 0, 0, Math.PI*2);
    ctx.stroke();

    ctx.beginPath();
    ctx.ellipse(cx, cy, r*Math.cos(angle), r, 0, 0, Math.PI*2);
    ctx.stroke();
  }

  // particles around globe
  for (let i = 0; i < 3; i++) {
    createParticle(cx + (Math.random()-0.5)*r, cy + (Math.random()-0.5)*r);
  }
}

const hands = new Hands({
  locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

hands.onResults(results => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawParticles();

  if (!results.multiHandLandmarks || results.multiHandLandmarks.length < 2) return;

  const hand1 = results.multiHandLandmarks[0];
  const hand2 = results.multiHandLandmarks[1];

  const p1 = getPoint(hand1, 8);
  const p2 = getPoint(hand2, 8);

  const cx = (p1.x + p2.x)/2;
  const cy = (p1.y + p2.y)/2;

  const dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);

  // better rotation
  let velocity = cx - prevCenterX;
  rotation += velocity * 0.02;
  prevCenterX = cx;

  if (dist > 180) {
    drawBands(hand1, hand2);
  } else {
    drawGlobe(cx, cy, dist * 0.9);
  }
});

const camera = new Camera(video, {
  onFrame: async () => {
    await hands.send({image: video});
  },
  width: 1280,
  height: 720
});

camera.start();
</script>

</body>
</html>
