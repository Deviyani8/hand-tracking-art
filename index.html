<!DOCTYPE html>
<html>
<head>
  <title>Neon Threads - Ultra Crisscross</title>
  <style>
    body { margin: 0; overflow: hidden; background: black; }
    video {
      position: absolute;
      width: 100vw; height: 100vh;
      object-fit: cover;
      transform: scaleX(-1);
      z-index: 0;
    }
    canvas {
      position: absolute;
      top: 0; left: 0;
      z-index: 2;
    }
    .overlay {
      position: absolute;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.4);
      z-index: 1;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<div class="overlay"></div>
<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// AUDIO
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let osc = audioCtx.createOscillator();
let gain = audioCtx.createGain();

osc.type = "sine";
osc.frequency.value = 200;
gain.gain.value = 0;

osc.connect(gain);
gain.connect(audioCtx.destination);
osc.start();

document.body.addEventListener("click", () => {
  audioCtx.resume();
});

let energy = 0;

// STATE
let digits = [];
let shapes = [];
let flares = [];
let prevPoints = {};

const colors = [
  "rgba(255,0,150,1)",
  "rgba(180,0,255,1)",
  "rgba(0,200,255,1)",
  "rgba(0,255,180,1)"
];

function lerp(a,b,t){ return a+(b-a)*t; }

function getPoint(hand,i,key){
  const raw={
    x:(1-hand[i].x)*canvas.width,
    y:hand[i].y*canvas.height
  };

  let prev=prevPoints[key]||raw;

  const smooth={
    x:lerp(prev.x,raw.x,0.4),
    y:lerp(prev.y,raw.y,0.4)
  };

  prevPoints[key]=smooth;
  return smooth;
}

// DIGITS
function createDigit(x,y){
  digits.push({
    x,y,
    vx:(Math.random()-0.5)*0.5,
    vy:(Math.random()-0.5)*0.5,
    life:1,
    size:3,
    value:Math.floor(Math.random()*10)
  });
}

function drawDigits(){
  digits.forEach(d=>{
    d.x+=d.vx;
    d.y+=d.vy;
    d.life-=0.02;

    ctx.fillStyle=`rgba(255,255,255,${d.life})`;
    ctx.font=`${d.size}px monospace`;
    ctx.fillText(d.value,d.x,d.y);
  });
  digits=digits.filter(d=>d.life>0);
}

// SHAPES
function drawPolygon(x,y,sides,size,opacity){
  ctx.beginPath();
  for(let i=0;i<sides;i++){
    const a=(i/sides)*Math.PI*2;
    const px=x+Math.cos(a)*size;
    const py=y+Math.sin(a)*size;
    if(i===0)ctx.moveTo(px,py);
    else ctx.lineTo(px,py);
  }
  ctx.closePath();
  ctx.strokeStyle=`rgba(255,255,255,${opacity})`;
  ctx.stroke();
}

function createShape(x,y){
  shapes.push({
    x,y,
    size:10+Math.random()*20,
    life:1,
    type:Math.floor(Math.random()*7)
  });
}

function drawShapes(){
  shapes.forEach(s=>{
    s.life-=0.01;
    const o=s.life*0.3;

    if(s.type<6)drawPolygon(s.x,s.y,s.type+3,s.size,o);
    else{
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
      ctx.strokeStyle=`rgba(255,255,255,${o})`;
      ctx.stroke();
    }
  });
  shapes=shapes.filter(s=>s.life>0);
}

// FLARES
function createFlare(x,y){
  flares.push({
    x,y,
    size:20+Math.random()*20,
    life:1
  });
}

function drawFlares(){
  flares.forEach(f=>{
    f.life-=0.02;

    const g=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.size);
    g.addColorStop(0,`rgba(255,220,100,${f.life*0.7})`);
    g.addColorStop(1,"rgba(255,150,0,0)");

    ctx.fillStyle=g;
    ctx.beginPath();
    ctx.arc(f.x,f.y,f.size,0,Math.PI*2);
    ctx.fill();
  });

  flares=flares.filter(f=>f.life>0);
}
