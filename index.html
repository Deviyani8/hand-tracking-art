<!DOCTYPE html>
<html>
<head>
  <title>Hand Interaction System</title>
  <style>
    body { margin: 0; overflow: hidden; background: black; }
    video {
      position: absolute;
      width: 100vw; height: 100vh;
      object-fit: cover;
      transform: scaleX(-1);
    }
    canvas {
      position: absolute;
      top: 0; left: 0;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let prev = [];
let rotation = 0;

// Smooth function
function lerp(a, b, t) {
  return a + (b - a) * t;
}

// Draw clean elastic string
function drawString(p1, p2) {
  ctx.beginPath();
  ctx.moveTo(p1.x, p1.y);

  const cx = (p1.x + p2.x) / 2;
  const cy = (p1.y + p2.y) / 2;

  ctx.quadraticCurveTo(cx, cy, p2.x, p2.y);

  ctx.strokeStyle = "rgba(0,255,100,0.9)";
  ctx.lineWidth = 4;
  ctx.shadowBlur = 15;
  ctx.shadowColor = "lime";

  ctx.stroke();
}

// Draw wireframe globe
function drawGlobe(centerX, centerY, radius) {
  ctx.strokeStyle = "rgba(0,255,200,0.8)";
  ctx.lineWidth = 1.5;
  ctx.shadowBlur = 20;
  ctx.shadowColor = "cyan";

  for (let i = 0; i < 10; i++) {
    const angle = i * Math.PI / 10 + rotation;

    ctx.beginPath();
    ctx.ellipse(
      centerX,
      centerY,
      radius,
      radius * Math.cos(angle),
      0,
      0,
      Math.PI * 2
    );
    ctx.stroke();
  }

  for (let i = 0; i < 10; i++) {
    const angle = i * Math.PI / 10 + rotation;

    ctx.beginPath();
    ctx.ellipse(
      centerX,
      centerY,
      radius * Math.cos(angle),
      radius,
      0,
      0,
      Math.PI * 2
    );
    ctx.stroke();
  }
}

const hands = new Hands({
  locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

hands.onResults(results => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!results.multiHandLandmarks || results.multiHandLandmarks.length < 2) return;

  const hand1 = results.multiHandLandmarks[0];
  const hand2 = results.multiHandLandmarks[1];

  const getPoint = (hand, i) => ({
    x: (1 - hand[i].x) * canvas.width,
    y: hand[i].y * canvas.height
  });

  const p1 = getPoint(hand1, 8); // index finger
  const p2 = getPoint(hand2, 8);

  const thumb1 = getPoint(hand1, 4);
  const thumb2 = getPoint(hand2, 4);

  const dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);

  // MODE SWITCH
  if (dist > 150) {
    // STRING MODE
    drawString(p1, p2);
    drawString(thumb1, thumb2);
  } else {
    // GLOBE MODE
    const cx = (p1.x + p2.x) / 2;
    const cy = (p1.y + p2.y) / 2;

    const radius = dist * 0.8;

    rotation += 0.02 + (p1.x - p2.x) * 0.0001;

    drawGlobe(cx, cy, radius);
  }
});

const camera = new Camera(video, {
  onFrame: async () => {
    await hands.send({image: video});
  },
  width: 1280,
  height: 720
});

camera.start();
</script>

</body>
</html>
