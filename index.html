<!DOCTYPE html>
<html>
<head>
  <title>Neon Digital Threads</title>
  <style>
    body { margin: 0; overflow: hidden; background: black; }
    video {
      position: absolute;
      width: 100vw; height: 100vh;
      object-fit: cover;
      transform: scaleX(-1);
    }
    canvas { position: absolute; top: 0; left: 0; }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let digits = [];
let shapes = [];
let prevPoints = {};

// Neon palette
const neonColors = [
  "rgba(255,0,150,0.9)", // pink
  "rgba(180,0,255,0.9)", // purple
  "rgba(0,200,255,0.9)", // blue
  "rgba(0,255,180,0.9)"  // green
];

// Helper
function getPoint(hand, i) {
  return {
    x: (1 - hand[i].x) * canvas.width,
    y: hand[i].y * canvas.height
  };
}

// DIGITS
function createDigit(x, y, intensity) {
  digits.push({
    x, y,
    vx: (Math.random()-0.5)*0.6,
    vy: (Math.random()-0.5)*0.6,
    life: 1,
    size: 4 + intensity*1.5,
    value: Math.floor(Math.random()*10)
  });
}

function drawDigits() {
  digits.forEach(d => {
    d.x += d.vx;
    d.y += d.vy;
    d.life -= 0.02;

    ctx.fillStyle = `rgba(255,255,255,${d.life})`;
    ctx.font = `${d.size}px monospace`;
    ctx.fillText(d.value, d.x, d.y);
  });

  digits = digits.filter(d => d.life > 0);
}

// POLYGON
function drawPolygon(x, y, sides, size, opacity) {
  ctx.beginPath();
  for (let i = 0; i < sides; i++) {
    const angle = (i / sides) * Math.PI * 2;
    const px = x + Math.cos(angle) * size;
    const py = y + Math.sin(angle) * size;

    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.strokeStyle = `rgba(255,255,255,${opacity})`;
  ctx.lineWidth = 1;
  ctx.stroke();
}

// SHAPES
function createShape(x, y) {
  shapes.push({
    x, y,
    size: 15 + Math.random()*25,
    life: 1,
    type: Math.floor(Math.random()*7)
  });
}

function drawShapes() {
  shapes.forEach(s => {
    s.life -= 0.01;
    let opacity = s.life * 0.3;

    if (s.type === 0) drawPolygon(s.x, s.y, 3, s.size, opacity);
    else if (s.type === 1) drawPolygon(s.x, s.y, 4, s.size, opacity);
    else if (s.type === 2) drawPolygon(s.x, s.y, 5, s.size, opacity);
    else if (s.type === 3) drawPolygon(s.x, s.y, 6, s.size, opacity);
    else if (s.type === 4) drawPolygon(s.x, s.y, 7, s.size, opacity);
    else if (s.type === 5) drawPolygon(s.x, s.y, 8, s.size, opacity);
    else {
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(255,255,255,${opacity})`;
      ctx.stroke();
    }
  });

  shapes = shapes.filter(s => s.life > 0);
}

// LINE
function drawLine(p1, p2, i) {
  const cx = (p1.x + p2.x)/2;
  const cy = (p1.y + p2.y)/2;

  ctx.beginPath();
  ctx.moveTo(p1.x, p1.y);

  ctx.quadraticCurveTo(
    cx + Math.sin(Date.now()*0.002 + i) * 20,
    cy + Math.cos(Date.now()*0.002 + i) * 20,
    p2.x,
    p2.y
  );

  const color = neonColors[i % neonColors.length];

  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.shadowBlur = 12;
  ctx.shadowColor = color;

  ctx.stroke();
}

const hands = new Hands({
  locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

hands.onResults(results => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawDigits();
  drawShapes();

  if (!results.multiHandLandmarks) return;

  const handsData = results.multiHandLandmarks;
  const fingers = [4, 8, 12, 16, 20];

  // motion
  handsData.forEach((hand, hi) => {
    fingers.forEach(f => {
      const p = getPoint(hand, f);

      let prev = prevPoints[hi+"_"+f] || p;
      let speed = Math.hypot(p.x-prev.x, p.y-prev.y);

      if (speed > 6) {
        if (Math.random() < 0.4) createDigit(p.x, p.y, speed*0.05);
        if (Math.random() < 0.1) createShape(p.x, p.y);
      }

      prevPoints[hi+"_"+f] = p;
    });
  });

  // 🔀 DENSE CRISSCROSS
  if (handsData.length >= 2) {
    const hand1 = handsData[0];
    const hand2 = handsData[1];

    fingers.forEach((f1, i) => {
      fingers.forEach((f2, j) => {
        if (i !== j) { // avoid straight mapping
          drawLine(getPoint(hand1, f1), getPoint(hand2, f2), i+j);
        }
      });
    });
  }
});

const camera = new Camera(video, {
  onFrame: async () => {
    await hands.send({image: video});
  },
  width: 1280,
  height: 720
});

camera.start();
</script>

</body>
</html>
